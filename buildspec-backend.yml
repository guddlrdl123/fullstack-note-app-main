version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - echo "Building Backend..."
      - cd backend && chmod +x gradlew && ./gradlew bootJar -x test
  post_build:
    commands:
      - echo "Preparing Deployment Package..."
      # 현재 위치가 이미 backend 폴더 안이므로 그 안에 만듭니다.
      - mkdir -p deploy-backend

      # 1. 현재 위치(backend) 기준 build/libs에서 jar를 찾아 복사
      - find build/libs/ -name "*.jar" ! -name "*plain.jar" -exec cp {} deploy-backend/note-app.jar \;

      # 2. 현재 위치(backend)에 있는 Procfile 복사
      - cp Procfile deploy-backend/ || echo "Procfile not found!"

      # 3. .ebextensions 복사 (있을 경우)
      - "[ -d .ebextensions ] && cp -r .ebextensions deploy-backend/ || true"

      - echo "Final Check:"
      - ls -la deploy-backend/

artifacts:
  files:
    - '**/*'
  # 중요: cd backend 상태에서 만든 폴더이므로 경로를 일치시킵니다.
  base-directory: backend/deploy-backend
  discard-paths: no