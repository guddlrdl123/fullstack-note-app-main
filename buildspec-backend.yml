version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - echo "Current Directory:" && pwd
      - cd backend
      - chmod +x gradlew
      - ./gradlew bootJar -x test
  post_build:
    commands:
      - mkdir -p deploy-backend

      # 1. [진단] 전체 디렉토리에서 .jar 파일이 어디에 생성되었는지 출력합니다.
      - echo "Searching for JAR files..."
      - find . -name "*.jar"

      # 2. [복사] 폴더 구조 무시하고 현재 위치에서 가장 가까운 실행 가능 JAR를 복사합니다.
      # backend 폴더 안으로 들어왔으므로 build/libs/*.jar 를 찾습니다.
      - cp build/libs/*.jar deploy-backend/note-app.jar || cp backend/build/libs/*.jar deploy-backend/note-app.jar || echo "JAR NOT FOUND"

      # 3. Procfile 복사
      - cp Procfile deploy-backend/ || cp backend/Procfile deploy-backend/ || echo "Procfile NOT FOUND"

      # 4. 결과 확인
      - ls -la deploy-backend/

artifacts:
  files:
    - '**/*'
  base-directory: backend/deploy-backend  # backend 폴더 안에서 작업 중이므로 경로 수정
  discard-paths: no